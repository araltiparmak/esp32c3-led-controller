name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache arduino-cli
        uses: actions/cache@v4
        with:
          path: ~/bin/arduino-cli
          key: arduino-cli-latest

      - name: Install arduino-cli
        run: |
          if [ ! -f ~/bin/arduino-cli ]; then
            curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=~/bin sh
          fi
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Cache ESP32 core and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-deps-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Add ESP32 board support
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install FastLED
        run: arduino-cli lib install "FastLED"

      - name: Create config.h from example
        run: cp firmware/config.example.h firmware/config.h

      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          printf '#define FIRMWARE_VERSION "%s"\n' "${VERSION}" > firmware/version.h

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3:CDCOnBoot=cdc \
            --output-dir build/ \
            firmware/

      - name: Rename .bin file
        run: |
          VERSION="${{ github.ref_name }}"
          mv build/firmware.ino.bin build/firmware-${VERSION}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/firmware-${{ github.ref_name }}.bin
          generate_release_notes: true
